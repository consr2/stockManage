spring.application.name=shop
server.port=80

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true


# DB 설정
#spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
#spring.datasource.url=jdbc:log4jdbc:mariadb://localhost:3306/shop\
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/shop
spring.datasource.username=root
spring.datasource.password=root2459
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.call-setters-on-nulls=true
mybatis.type-aliases-package=com.my.shop

#devTools 설정
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
spring.devtools.restart.exclude=static/**,templates/**,public/**
spring.thymeleaf.cache=false

#log 설정
logging.level.com.my.shop=DEBUG
logging.level.org.mybatis=DEBUG
logging.level.org.mybatis.spring=INFO
logging.level.spring.framework.jdbc.datasource=TRACE
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
logging.level.org.apache.catalina.core.ContainerBase=WARN
logging.level.com.zaxxer.hikari=WARN


#캐시설정
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**