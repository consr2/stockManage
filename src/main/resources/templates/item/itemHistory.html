<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입출고 이력(명세서)</title>
    <link rel="stylesheet" href="/js/lib/tui-grid.css" />
    <link rel="stylesheet" href="/css/item/itemHistory.css">
</head>
<body>
<div class="dashboard">
    <header class="main-header">
        <a href="/index" class="back-link">← 뒤로가기</a>
        <h1>입출고 이력(계산서)</h1>
    </header>

    <section class="search-container">
        <div class="search-row">
            <div class="filter-group">
                <label>시작일</label>
                <input type="date" id="startDt">
            </div>
            <div class="filter-group">
                <label>종료일</label>
                <input type="date" id="endDt">
            </div>
            <div class="filter-group">
                <label>구분</label>
                <select id="typeSelect">
                    <option value="">전체</option>
                    <option value="IN">입고</option>
                    <option value="OUT">출고</option>
                </select>
            </div>
        </div>
        <div class="search-row">
            <div class="filter-group">
                <label>품명</label>
                <input type="text" placeholder="품목 검색" id="itemName">
            </div>
            <div class="filter-group">
                <label>고객/담당자</label>
                <input type="text" placeholder="성함/업체명" id="customer">
                <div id="autocompleteList"></div>
            </div>
            <button class="btn-search" id="itemHistorySearchBtn">조회</button>
        </div>
    </section>
    <div class="excelBtnBox">
        <button class="btn-search excelBtn" id="paymentReportBtn">명세서 출력</button>
        <button class="btn-search excelBtn" id="excelDownBtn">엑셀다운</button>
    </div>
    <div class="gridBox" id="grid"></div>

    <div id="paymentTemplate" class="paymentTemplate" style="display: none">
        <style>
            /* 명세서 헤더 레이아웃 */
            .report-header {
                display: flex;
                width: 850px;
                border: 1px solid #000;
                align-items: stretch;
            }

            /* 좌측 영역: 제목 및 귀하 정보 */
            .header-left {
                flex: 2;
                display: flex;
                flex-direction: column;
                border-right: 1px solid #000;
            }

            .report-title {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 22px;
                font-weight: bold;
                border-bottom: 1px solid #000;
            }

            .client-info {
                padding: 10px;
                font-size: 12px;
            }

            /* 중앙: 공급자 세로바 */
            .supplier-vertical-bar {
                width: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #f2f2f2;
                border-right: 1px solid #000;
                font-size: 12px;
                text-align: center;
                font-weight: bold;
            }

            /* 우측 영역: 등록번호 및 상호 정보 */
            .header-right {
                flex: 3;
                display: flex;
                flex-direction: column;
            }

            .reg-info-row {
                display: flex;
                border-bottom: 1px solid #000;
            }

            .reg-label {
                width: 80px;
                background: #f2f2f2;
                padding: 5px;
                text-align: center;
                border-right: 1px solid #000;
                font-size: 11px;
            }

            .reg-value {
                flex: 1;
                padding: 5px;
                font-size: 11px;
            }

            /* 우측 하단 상세 정보 */
            .provider-detail {
                flex: 1;
                display: flex;
                position: relative;
                font-size: 12px;
                line-height: 1.6;
                align-items: flex-start;
            }

            .detail-label-group {
                width: 80px;
                color: #555;
                font-weight: bold;
                border-right: 1px solid black;
                padding: 10px;
                text-align: center;
                background: #f2f2f2;
            }

            .detail-value-group {
                flex: 1;
                z-index: 1;
                padding: 10px;
            }

            .detail-company-name {
                font-weight: bold;
                font-size: 13px;
            }

            /* 직인 이미지 */
            .stamp-image {
                position: absolute;
                right: 20px;
                bottom: 5px;
                width: 65px;
                height: 65px;
                opacity: 0.7;
                pointer-events: none;
                z-index: 0;
            }

            .flex{
                display: flex;
            }
            .flex1{
                flex:1;
            }

            .border{
                border: 1px solid black;
            }
            .padding5{
                padding: 5px;
            }
            /* 기타 및 하단 요약 테이블 */
            .report-footer {
                width: 850px;
                margin-top: 10px;
                border: 1px solid #000;
                font-size: 12px;
            }

            .etc-row {
                padding: 5px 10px;
                border-bottom: 1px solid #000;
                min-height: 25px;
            }

            .summary-table {
                width: 100%;
                border-collapse: collapse;
            }

            .summary-table td {
                border-right: 1px solid #000;
                border-bottom: 1px solid #000;
                padding: 5px;
                text-align: center;
                font-size: 14px;
            }

            .summary-label {
                background-color: #f2f2f2;
                font-weight: bold;
                width: 80px;
            }

            .summary-value {
                text-align: right !important;
                padding-right: 10px !important;
                width: 120px;
            }

            .account-row {
                display: flex;
                align-items: stretch;
            }

            .account-label {
                width: 161px; /* 수량+공급가액 라벨 합계와 맞춤 */
                background-color: #f2f2f2;
                font-weight: bold;
                text-align: center;
                padding: 5px 0;
                border-right: 1px solid #000;
            }

            .account-value {
                flex: 1;
                padding: 5px 10px;
            }

            .font-size14{
                font-size: 14px;
                font-weight: 800;
            }
            /* 테이블 기본 설정 */
            .item-table {
                width: 850px;
                border-collapse: collapse;
                border: 1px solid #000;
                font-size: 12px;
            }

            /* 테이블 헤더 (월/일, 품목명 등) */
            .item-table th {
                background-color: #f2f2f2;
                border: 1px solid #000;
                padding: 8px 5px;
                font-weight: 800; /* 굵게 */
                text-align: center;
            }

            /* 데이터가 들어가는 각 셀 */
            .item-table td {
                border: 1px solid #000;
                padding: 5px;
                height: 25px; /* 빈 칸도 일정하게 높이 유지 */
                text-align: center;
            }

            /* 금액과 관련된 열은 우측 정렬 */
            .text-right {
                text-align: right !important;
                padding-right: 10px !important;
            }

            /* 품목명이나 규격명 등 텍스트 긴 곳은 좌측 정렬 */
            .text-left {
                text-align: left !important;
                padding-left: 10px !important;
            }
            .client-info p {
                margin: 0;
                padding: 0;
                line-height: 1.2;
            }
        </style>
        <div>
            <div class="report-header">
                <div class="header-left">
                    <div class="report-title">거 래 명 세 서</div>
                    <div class="client-info">
                        <strong id="report_customer"></strong>
                        <p><span>☎ </span><span id="report_customerTel"></span></p>
                        <p id="report_address"></p>
                    </div>
                </div>

                <div class="supplier-vertical-bar">
                    공<br>급<br>자
                </div>

                <div class="header-right">
                    <div style="display: flex; flex-direction: column; border-bottom: 1px solid #000;">
                        <div class="reg-info-row">
                            <div class="reg-label">일련번호</div>
                            <div class="reg-value" id="report_serialNum">20260309 - 44</div>
                        </div>
                        <div class="reg-info-row" style="border-bottom: none;">
                            <div class="reg-label">사업자번호</div>
                            <div class="reg-value">744-20-02727</div>
                        </div>
                    </div>

                    <div class="provider-detail">
                        <div class="detail-label-group">
                            <div>상 호</div>
                            <div>전화번호</div>
                            <div>주 소</div>
                        </div>

                        <div class="detail-value-group">
                            <div class="detail-company-name">(주) 이레의료기</div>
                            <div>☎ 051-521-2779</div>
                            <div style="word-break: keep-all;">부산광역시 동래구 충렬대로 391, 1층(안락동)</div>
