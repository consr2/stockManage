<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>품목재고조회</title>
    <link rel="stylesheet" href="/js/lib/tui-grid.css" />
    <link rel="stylesheet" href="/css/item/itemList.css">
</head>
<body>
<div class="dashboard">
    <header class="main-header">
        <a href="/index" class="back-link">← 뒤로가기</a>
        <h1>품목재고조회</h1>
    </header>

    <section class="search-container">
        <div class="search-row">
            <div class="filter-group">
                <label>시작일</label>
                <input type="date" id="startDt">
            </div>
            <div class="filter-group">
                <label>종료일</label>
                <input type="date" id="endDt">
            </div>
        </div>
        <div class="flex-right">
            <div class="filter-group">
                <label>품명</label>
                <input style="width: 400px;" id="itemName">
            </div>
            <button class="btn-search" id="itemListSearchBtn">조회</button>
        </div>
    </section>
    <div class="excelBtnBox">
        <button class="btn-search excelBtn" id="excelDownBtn">엑셀다운</button>
    </div>
    <div class="gridBox" id="grid"></div>


    <div id="itemModal" class="modal">
        <div class="modal-content">
            <header>
                <h3>단가 수정</h3>
                <div class="item-info">
                    <strong>품목명</strong>
                    <span id="modalItemName">품목 데이터 대기 중...</span>
                </div>
            </header>
            <div class="table-wrapper">
                <table class="history-table">
                    <thead>
                    <tr>
                        <th>매입단가</th>
                        <th>매출단가</th>
                    </tr>
                    </thead>
                    <tbody id="modalHistoryBody">
                        <tr>
                            <td hidden>
                                <input id="itemId">
                            </td>
                            <td>
                                <input id="price1">
                            </td>
                            <td>
                                <input id="price2">
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <footer class="modal-footer">
                <button type="button" class="btn-close" onclick="document.getElementById('itemModal').style.display = 'none'">취소</button>
                <button type="button" id="savePriceBtn" class="btn-save">저장</button>
            </footer>
        </div>
    </div>
</div>
</body>
<script src="/js/lib/xlsx.js"></script>
<script src="/js/lib/tui-grid.js"></script>
<script th:src="@{/js/util/util.js(v=${#dates.createNow().getTime()})}"></script>
<script th:src="@{/js/util/tuiGrid.js(v=${#dates.createNow().getTime()})}"></script>
<script th:src="@{/js/util/createComponent.js(v=${#dates.createNow().getTime()})}"></script>
<script th:src="@{/js/component/item/itemList.js(v=${#dates.createNow().getTime()})}"></script>
</html>
